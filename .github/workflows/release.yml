name: Release

# Changesets-driven release flow.
#
# On every push to main this workflow either:
#   1. opens/updates a "Version Packages" PR that consumes the pending changesets,
#      bumps versions, and writes CHANGELOGs; or
#   2. if that PR was just merged (changesets consumed), builds and publishes the
#      changed packages to npm, then creates git tags + GitHub Releases.
#
# There is no manual version bumping — versions emerge from the changesets in each PR.

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the version PR, create tags + GitHub Releases
      pull-requests: write # open/update the "Version Packages" PR
      id-token: write # npm provenance

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Release PR or Publish to npm
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
