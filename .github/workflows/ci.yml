name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  bundle-size:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Check bundle size (gzipped)
        run: |
          cd packages/core
          # Gzipped size is what users actually download, so that's what we budget.
          RAW=$(stat -c%s dist/index.js)
          GZIP=$(gzip -c dist/index.js | wc -c)
          BUDGET=15360  # 15 KB gzipped hard ceiling (current: ~12.7 KB)
          echo "Core bundle: raw ${RAW} B, gzipped ${GZIP} B (budget ${BUDGET} B)"
          if [ "$GZIP" -gt "$BUDGET" ]; then
            echo "::error::Gzipped bundle ${GZIP} B exceeds budget ${BUDGET} B"
            exit 1
          fi
          echo "::notice::Gzipped bundle ${GZIP} B is within the ${BUDGET} B budget"
