# Legacy GitHub Pages deploy. The site now deploys on Vercel (full Next.js /
# SSR), so this no longer runs on push — the app is no longer a static export,
# so `examples/out/` won't exist. Kept as manual-only for emergency fallback;
# to use it again, restore `output: 'export'` + `basePath` in next.config.ts.
name: Deploy static content to Pages

on:
  # Manual only — Vercel is the production deployer.
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: pnpm build

      - name: Build Next.js examples site
        run: |
          cd examples
          pnpm build
        env:
          NODE_ENV: production

      - name: Prepare deployment folder
        run: |
          mkdir -p _site
          cp -r examples/out/* _site/
          touch _site/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
